<div class="compact-audio-control">
  <mat-slide-toggle
    [checked]="isMicrophone()"
    (change)="toggleSource()"
    color="primary"
    [disabled]="isSwitching()"
    [matTooltip]="toggleLabel()"
  >
    <div class="toggle-content">
      <mat-icon>{{ toggleIcon() }}</mat-icon>
      <span class="label-text">{{ isMicrophone() ? 'Mic' : 'System' }}</span> 
    </div>
  </mat-slide-toggle>

  @if (isSwitching()) {
    <mat-spinner diameter="20"></mat-spinner>
  } @else if (errorMessage(); as msg) {
    <mat-icon class="error-icon" color="warn" [matTooltip]="msg">error_outline</mat-icon>
  }
</div>
