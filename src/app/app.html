<div class="dashboard-layout" [class.overlay-mode]="screenMode() === 'overlay'">
  @if (screenMode() === 'normal') {
    <app-chat />

    <div class="controls-and-preview-column">
      <app-audio-source-controls />
      <app-screen-capture />
    </div>

    <app-ai-answer />
  } @else {
    <div class="overlay-container">
      <app-ai-answer class="overlay-answer" [overlayMode]="true" />
      <app-screen-capture class="overlay-screen-capture" />
    </div>
  }
</div>
